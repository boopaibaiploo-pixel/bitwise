<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitewise - Start Your Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Tiger Character -->
        <div class="character-wrapper">
            <img src="tiger.png" alt="Tiger Character" class="character">
        </div>

        <!-- Challenge Card -->
        <div class="challenge-card">
            <h1 class="challenge-title">START YOUR CHALLENGE</h1>
            
            <div class="input-group">
                <input type="text" class="challenge-input" placeholder="พิมพ์ชื่อ">
                <button class="arrow-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
